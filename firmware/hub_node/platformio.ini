; NexusCap - Hub Node PlatformIO Project
; Flash to the single ESP32 that acts as the Wi-Fi / UDP gateway.
; Edit include/config.h before flashing.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; No extra libraries needed – uses ESP-NOW and WiFiUdp from ESP-IDF/Arduino core
