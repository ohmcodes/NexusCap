; NexusCap - Sensor Node PlatformIO Project
; Flash to every IMU board that is worn on the body.
; Edit include/config.h to set the SENSOR_ID and HUB_MAC before flashing.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    ; MPU6050 with DMP support (quaternion output)
    electroniccats/MPU6050 @ ^1.3.0
    ; I2Cdevlib-Core (required by MPU6050 library)
    jrowberg/I2Cdevlib-Core @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Increase FreeRTOS stack if DMP ISR is used
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
